services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: heliolytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: heliolytics
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heliolytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ..
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HELIOLYTICS_SIGNING_SECRET: ${HELIOLYTICS_SIGNING_SECRET}
      DATABASE_URL: postgres://heliolytics:${POSTGRES_PASSWORD}@db:5432/heliolytics?sslmode=disable
      ADDR: :8080
      RATE_LIMIT_PER_MIN: "120"
      TRUST_PROXY: "true"
      REPARSE_ENABLED: ${REPARSE_ENABLED:-false}
      REPARSE_SECRET: ${REPARSE_SECRET:-}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ../../Heliolytics_Web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
      HELIOLYTICS_SIGNING_SECRET: ${HELIOLYTICS_SIGNING_SECRET}
      HELIOLYTICS_WEB_PASSWORD: ${HELIOLYTICS_WEB_PASSWORD}
      API_INTERNAL_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  pgdata:
